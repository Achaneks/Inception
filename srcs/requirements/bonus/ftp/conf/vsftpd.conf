# Allow local system users to log in
local_enable=YES

# Allow uploading files
write_enable=YES

# Run in standalone mode (not via inetd)
listen=YES
listen_ipv6=NO

# Disable anonymous access
anonymous_enable=NO

# Chroot users to their home directory (security)
chroot_local_user=YES
allow_writeable_chroot=YES

# Passive mode — required for most FTP clients behind NAT
pasv_enable=YES
pasv_min_port=21000
pasv_max_port=21010

# Point passive mode to the container's address
pasv_address=127.0.0.1

# Log all FTP commands
xferlog_enable=YES

# Run in foreground (Docker requirement)
background=NO

# Restrict FTP user to WordPress files directory
local_root=/var/www/html