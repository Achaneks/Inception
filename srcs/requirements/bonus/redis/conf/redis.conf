# Listen on all interfaces so WordPress container can reach it
bind 0.0.0.0

# Default port
port 6379

# Don't daemonize — Docker keeps it in foreground
daemonize no

# Allow any amount of memory usage (no limit for this project)
maxmemory 0

# When memory is full, remove least recently used keys
maxmemory-policy allkeys-lru

# Disable saving to disk (we only use Redis as a cache, not persistent store)
save ""