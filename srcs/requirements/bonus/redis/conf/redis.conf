# Listen on all interfaces so WordPress container can reach it
bind 0.0.0.0

# Default port
port 6379

# Don't daemonize — Docker keeps it in foreground
daemonize no

# ── THIS IS THE CRITICAL FIX ────────────────────────────────
# Protected mode blocks external connections when no password is set.
# We disable it because Redis is on a private Docker network —
# it's not exposed to the internet, only to our containers.
protected-mode no

# No memory limit (cache only)
maxmemory 0
maxmemory-policy allkeys-lru
# Disable saving to disk (Redis is a cache here, not persistent store)
save ""